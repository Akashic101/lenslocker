name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Required so `vite build` / SvelteKit postbuild can load server modules that open SQLite.
      DATABASE_URL: ':memory:'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format and ESLint
        run: bun run lint

      - name: Unit tests with coverage (≥95% statements/branches/functions/lines)
        run: bun run test:unit -- --run --coverage --project server

      - name: Build
        run: bun run build
