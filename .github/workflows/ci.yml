name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Server modules run during `vite build` / SvelteKit postbuild; match what a real deploy sets.
      DATABASE_URL: ':memory:'
      # `auth.ts` uses ORIGIN for Better Auth `baseURL` when not in dev; empty breaks redirects and logs warnings.
      ORIGIN: http://127.0.0.1:3000
      # Required by Better Auth at init; value is only for CI, not a real secret.
      BETTER_AUTH_SECRET: ci-only-placeholder-not-for-production-min-32-chars-long
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format and ESLint
        run: bun run lint

      - name: knip
        run: bun run knip

      - name: Unit tests with coverage (≥95% statements/branches/functions/lines)
        run: bun run test:unit -- --run --coverage --project server

      - name: Build
        run: bun run build
