# Try: git clone … && cd lenslocker && docker compose up -d  → http://localhost:3000
# Optional: create .env with BETTER_AUTH_SECRET and ORIGIN for production (see docker-compose.example.yaml).

services:
  lenslocker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: /data/lenslocker.db
      TRANSFORMED_MEDIA_ROOT: /data/transformed
      RAW_UPLOAD_ROOT: /data/uploads/raw
      LENSLOCKER_BACKUP_ROOT: /data/backups
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      # Default is for local try-out only. Override via .env or shell when exposing to a network.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-lenslocker_dev_only_replace_before_production_min32chars}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: '3000'
    volumes:
      - lenslocker_data:/data

volumes:
  lenslocker_data:
